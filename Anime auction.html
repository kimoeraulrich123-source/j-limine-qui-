{name:"Sai",title:"Encre Vivante",power:50,tier:"C",emoji:"🖌️",desc:"Dessins vivants."},
{name:"Temari",title:"Éventail",power:49,tier:"C",emoji:"🌪️",desc:"Fūton dévastateur."},
{name:"Chōji",title:"Mode Papillon",power:48,tier:"C",emoji:"🦋",desc:"Expansion géante."},
{name:"Hinata",title:"Poing du Lion",power:47,tier:"C",emoji:"🫧",desc:"Byakugan."},
{name:"Haku",title:"Miroirs de Glace",power:46,tier:"C",emoji:"❄️",desc:"Kekkei Genkai Hyōton."},
{name:"Kankurō",title:"Marionnettiste",power:46,tier:"C",emoji:"🎭",desc:"Karasu, Kuroari."},
{name:"Shino",title:"Insectes",power:44,tier:"C",emoji:"🐛",desc:"Insectes dévoreurs."},
{name:"Kiba",title:"Croc-à-Croc",power:42,tier:"C",emoji:"🐕",desc:"Combo avec Akamaru."},
{name:"Ino",title:"Transfert d'Esprit",power:41,tier:"C",emoji:"💐",desc:"Possession mentale."},
{name:"Konohamaru",title:"Futur Hokage",power:38,tier:"D",emoji:"🧣",desc:"Rasengan."},
{name:"Tenten",title:"Armes",power:32,tier:"D",emoji:"🎯",desc:"Maîtrise toutes les armes."},
{name:"Iruka",title:"Professeur",power:25,tier:"D",emoji:"📚",desc:"Le premier à croire en Naruto."},
];
const UNI={naruto:NARUTO};

let G={roomId:null,myId:null,myName:'',isHost:false,universe:null,roomData:null,unsub:null};

async function createRoom(u){
  const p=gp();G.myName=p?.name||'Joueur1';G.myId='p_'+Math.random().toString(36).slice(2,10);G.roomId=rc();G.isHost=true;G.universe=u;
  const all=[...UNI[u]];for(let i=all.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[all[i],all[j]]=[all[j],all[i]];}
  await setDoc(rr(G.roomId),{roomId:G.roomId,universe:u,hostId:G.myId,phase:'lobby',pool:all.slice(0,10),
    p1:{id:G.myId,name:G.myName,budget:350000000,roster:[],ready:true},
    p2:{id:'',name:'',budget:350000000,roster:[],ready:false},
    auction:{currentIdx:0,currentBid:0,currentBidderId:'',turn:1},combat:{winner:'',log:[],p1Score:0,p2Score:0,countdown:10},createdAt:Date.now()});
  history.replaceState(null,'',location.pathname+'?room='+G.roomId);sub();toast('Salle '+G.roomId+' créée');
}
async function joinRoom(code){
  const p=gp();G.myName=p?.name||'Joueur2';G.myId='p_'+Math.random().toString(36).slice(2,10);G.roomId=code;
  const snap=await getDoc(rr(code));if(!snap.exists()){toast('Salle introuvable !');return;}
  const d=snap.data();if(d.p2?.ready){toast('Salle pleine !');return;}
  G.isHost=false;G.universe=d.universe;
  await updateDoc(rr(code),{'p2.id':G.myId,'p2.name':G.myName,'p2.ready':true});sub();toast('Rejoint !');
}
function sub(){if(G.unsub)G.unsub();G.unsub=onSnapshot(rr(G.roomId),s=>{if(!s.exists())return;G.roomData=s.data();render();});}
function amP1(){return G.roomData?.p1?.id===G.myId;}
function myN(){return amP1()?1:2;}
function myD(){return amP1()?G.roomData.p1:G.roomData.p2;}

function render(){
  const d=G.roomData;if(!d)return;
  const rb=$('rBadge');rb.style.display='inline';rb.textContent='Salle : '+G.roomId;
  if(d.phase==='lobby')rLobby();
  else if(d.phase==='auction')rAuction();
  else if(d.phase==='countdown'||d.phase==='combat')rCombat();
}
function rLobby(){
  show('sLob');const d=G.roomData;
  $('lT').textContent=`Salle ${G.roomId} — ${d.universe==='naruto'?'🍥 Naruto':'Anime'}`;
  $('sLink').value=location.origin+location.pathname+'?room='+G.roomId;
  const lp=$('lP');lp.innerHTML='';
  [d.p1,d.p2].forEach((p,i)=>{
    if(!p.ready&&!p.name){lp.innerHTML+=`<div class="lpi" style="border-style:dashed;opacity:.5"><div class="la" style="background:var(--tx3)">?</div><span class="ln" style="color:var(--tx3)">En attente...</span></div>`;return;}
    lp.innerHTML+=`<div class="lpi"><div class="la" style="background:${ac(p.name)}">${(p.name||'?')[0].toUpperCase()}</div><span class="ln">${p.name}</span><span class="lt">${p.id===G.myId?'Toi':'Adversaire'}${i===0?' · Hôte':''}</span></div>`;
  });
  const b=$('bStart');
  if(d.p1.ready&&d.p2.ready){b.disabled=!G.isHost;b.textContent=G.isHost?'▶ Lancer les enchères':'En attente...';}
  else{b.disabled=true;b.textContent='En attente du 2ème joueur...';}
  $('lS').textContent=d.p2.ready?'Les deux joueurs sont prêts !':'Envoie le lien à ton adversaire.';
}
function rAuction(){
  show('sAuc');const d=G.roomData,a=d.auction,ch=d.pool[a.currentIdx];if(!ch)return;
  $('pB').innerHTML=[d.p1,d.p2].map((p,i)=>`<div class="pb ${a.turn===i+1?'act':''}"><div class="pn">${p.name}${p.id===G.myId?' (toi)':''}</div><div class="pbu">💰 ${ff(p.budget)} €</div><div class="pc">${p.roster.length}/5 personnages</div><div class="prs">${p.roster.map(c=>`<span class="pm">${c.emoji} ${c.name}</span>`).join('')}</div></div>`).join('');
  $('aP').textContent=`Personnage ${a.currentIdx+1}/10`;
  const tc=ch.tier==='S'?'ts':ch.tier==='A'?'ta':ch.tier==='B'?'tbb':ch.tier==='C'?'tc':'td';
  $('cS').innerHTML=`<div class="ce">${ch.emoji}</div><div class="cn">${ch.name}</div><div class="ct">${ch.title}</div><div class="cd">${ch.desc}</div><span class="tb ${tc}">⚡ ${ch.power}/100 — Tier ${ch.tier}</span>`;
  const imt=a.turn===myN(),tn=a.turn===1?d.p1.name:d.p2.name;
  let bi='';if(a.currentBid>0){const bn=a.currentBidderId===d.p1.id?d.p1.name:d.p2.name;bi=`<div class="bc"><div class="bl">Enchère actuelle</div><div class="ba">${ff(a.currentBid)} €</div><div class="bw">par ${bn}</div></div>`;}else{bi=`<div class="bc"><div class="bl">Aucune enchère</div><div class="ba" style="color:var(--tx3)">—</div></div>`;}
  $('bZ').innerHTML=`${bi}<div class="bt">${imt?'👉 C\'est ton tour !':'⏳ '+tn+' réfléchit...'}</div>${imt?`<div class="bir"><input class="bi" id="bI" type="text" placeholder="Ex: 5M, 10M" autocomplete="off"/></div><div class="bas"><button class="btn btn-g btn-s" id="bB">💰 Enchérir</button><button class="btn btn-r btn-s" id="bP">${a.currentBid>0?'✋ Laisser':'⏭️ Passer'}</button></div>`:'<div style="text-align:center;padding:8px;font-size:.85rem;color:var(--tx2)">En attente...</div>'}<div class="bh">Nombres ronds : 1M, 5M, 50M…</div><div class="be" id="bE"></div>`;
  if(imt){$('bB')?.addEventListener('click',doBid);$('bP')?.addEventListener('click',doPass);$('bI')?.addEventListener('keydown',e=>{if(e.key==='Enter')doBid();});setTimeout(()=>$('bI')?.focus(),50);}
}
function rCombat(){
  show('sCom');const d=G.roomData;
  if(d.phase==='countdown'){$('cC').innerHTML=`<div style="font-family:'Syne',sans-serif;font-weight:900;font-size:1.5rem;margin-bottom:8px">⚔️ Combat Final</div><div style="color:var(--tx2);margin-bottom:20px">${d.p1.name} vs ${d.p2.name}</div>${rT(d)}<div class="cdn">${d.combat.countdown||10}</div><div style="color:var(--tx2)">Le combat se prépare...</div>`;return;}
  const w=d.combat.winner,wn=w===1?d.p1.name:d.p2.name;
  $('cC').innerHTML=`<div style="font-family:'Syne',sans-serif;font-weight:900;font-size:1.5rem;margin-bottom:8px">⚔️ Combat Final</div>${rT(d,w)}<div class="cl" id="cL"></div><div class="rb"><div class="re">🏆</div><div class="rt">${wn} remporte le combat !</div><div class="rs">Score : ${Math.round(d.combat.p1Score)} vs ${Math.round(d.combat.p2Score)}</div></div><button class="btn btn-o btn-f" id="bR">🔄 Rejouer</button>`;
  const l=$('cL');if(l&&d.combat.log)d.combat.log.forEach((x,i)=>setTimeout(()=>{const e=document.createElement('div');e.className='cll '+(x.cls||'');e.textContent=x.text;l.appendChild(e);l.scrollTop=l.scrollHeight;},i*500));
  $('bR')?.addEventListener('click',async()=>{if(!G.isHost){toast('Seul l\'hôte peut relancer.');return;}const all=[...UNI[G.universe]];for(let i=all.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[all[i],all[j]]=[all[j],all[i]];}await updateDoc(rr(G.roomId),{phase:'auction',pool:all.slice(0,10),'p1.budget':350000000,'p1.roster':[],'p2.budget':350000000,'p2.roster':[],auction:{currentIdx:0,currentBid:0,currentBidderId:'',turn:1},combat:{winner:'',log:[],p1Score:0,p2Score:0,countdown:10}});});
}
function rT(d,w){return`<div class="cv">${[d.p1,d.p2].map((p,i)=>`<div class="cvt ${w===i+1?'win':''}"><div class="cvn" style="color:${w===i+1?'var(--gold)':i===0?'var(--accent)':'var(--purple)'}">${p.name} ${w===i+1?'🏆':''}</div>${p.roster.map(c=>`<div class="cvc"><span class="cvce">${c.emoji}</span><span class="cvcn">${c.name}</span><span class="cvcp">${c.power}</span></div>`).join('')}<div class="cvtl">Puissance : ${p.roster.reduce((s,c)=>s+c.power,0)}</div></div>`).join('')}</div>`;}

async function doBid(){
  const v=pa($('bI')?.value||''),d=G.roomData,a=d.auction,me=myD();
  if(v===null){$('bE').textContent='Format invalide.';return;}
  if(!ir(v)){$('bE').textContent='Nombre rond requis.';return;}
  if(v<=0){$('bE').textContent='Positif requis.';return;}
  if(v<=a.currentBid){$('bE').textContent=`Doit dépasser ${ff(a.currentBid)} €`;return;}
  if(v>me.budget){$('bE').textContent=`Budget insuffisant (${ff(me.budget)} €)`;return;}
  await updateDoc(rr(G.roomId),{'auction.currentBid':v,'auction.currentBidderId':G.myId,'auction.turn':a.turn===1?2:1});
}
async function doPass(){
  const d=G.roomData,a=d.auction;
  if(a.currentBid===0&&!a.currentBidderId){$('bE').textContent='Mise minimum : 1M !';return;}
  if(!a.currentBidderId){$('bE').textContent='Personne n\'a enchéri !';return;}
  const wk=a.currentBidderId===d.p1.id?'p1':'p2',ok=wk==='p1'?'p2':'p1';
  const ch=d.pool[a.currentIdx],w=d[wk],o=d[ok];
  const nr=[...w.roster,ch],nb=w.budget-a.currentBid,ni=a.currentIdx+1;
  const u={};u[`${wk}.budget`]=nb;u[`${wk}.roster`]=nr;
  if(nr.length>=5&&o.roster.length>=5||ni>=10){
    if(ni<10){const rem=d.pool.slice(ni);u[`${nr.length>=5?ok:wk}.roster`]=[...d[nr.length>=5?ok:wk].roster,...rem];}
    u.phase='countdown';u['combat.countdown']=10;u['auction.currentIdx']=10;
    await updateDoc(rr(G.roomId),u);if(G.isHost)startCD();
  }else if(nr.length>=5){
    u[`${ok}.roster`]=[...o.roster,...d.pool.slice(ni)];u.phase='countdown';u['combat.countdown']=10;u['auction.currentIdx']=10;
    await updateDoc(rr(G.roomId),u);if(G.isHost)startCD();
  }else if(o.roster.length>=5){
    u[`${wk}.roster`]=[...nr,...d.pool.slice(ni)];u.phase='countdown';u['combat.countdown']=10;u['auction.currentIdx']=10;
    await updateDoc(rr(G.roomId),u);if(G.isHost)startCD();
  }else{
    u['auction.currentIdx']=ni;u['auction.currentBid']=0;u['auction.currentBidderId']='';u['auction.turn']=(ni%2===0)?1:2;
    await updateDoc(rr(G.roomId),u);
  }
}
function startCD(){let c=10;const iv=setInterval(async()=>{c--;await updateDoc(rr(G.roomId),{'combat.countdown':c});if(c<=0){clearInterval(iv);combat();}},1000);}
async function combat(){
  const d=(await getDoc(rr(G.roomId))).data(),t1=d.p1.roster,t2=d.p2.roster;
  const s1=t1.reduce((s,c)=>s+c.power,0)*(0.85+Math.random()*0.30),s2=t2.reduce((s,c)=>s+c.power,0)*(0.85+Math.random()*0.30);
  const w=s1>=s2?1:2,wn=w===1?d.p1.name:d.p2.name,ln=w===1?d.p2.name:d.p1.name;
  const wt=[...(w===1?t1:t2)].sort((a,b)=>b.power-a.power),lt=[...(w===1?t2:t1)].sort((a,b)=>b.power-a.power);
  const log=[{text:"═══ LE COMBAT COMMENCE ═══",cls:"hl"},{text:"Les deux équipes se font face...",cls:"nr"},
  {text:`${lt[4].emoji} ${lt[4].name} s'élance, ${wt[4].emoji} ${wt[4].name} intercepte !`},
  {text:`${wt[3].emoji} ${wt[3].name} entre en jeu face à ${lt[3].emoji} ${lt[3].name}.`},
  {text:"Le terrain tremble...",cls:"nr"},
  {text:wt[2].power>lt[2].power?`${wt[2].emoji} ${wt[2].name} (${wt[2].power}) domine ${lt[2].emoji} ${lt[2].name} (${lt[2].power}) !`:`${lt[2].emoji} ${lt[2].name} résiste à ${wt[2].emoji} ${wt[2].name} !`},
  {text:"═══ LES PLUS PUISSANTS ENTRENT EN JEU ═══",cls:"hl"},
  {text:`${wt[1].emoji} ${wt[1].name} face à ${lt[1].emoji} ${lt[1].name}. Le sol se fissure.`},
  {text:`Dernier duel : ${wt[0].emoji} ${wt[0].name} (${wt[0].power}) VS ${lt[0].emoji} ${lt[0].name} (${lt[0].power}) !`,cls:"hl"},
  {text:wt[0].power>=lt[0].power?`${wt[0].emoji} ${wt[0].name} déchaîne sa puissance !`:`${lt[0].emoji} ${lt[0].name} prend l'avantage, mais ${wn} se regroupe !`},
  {text:`Attaque combinée de ${wn} !`,cls:"nr"},
  {text:`${wt.map(c=>c.emoji).join(' ')} → Attaque finale !`,cls:"hl"},
  {text:`L'équipe de ${ln} s'effondre...`},{text:''},{text:`🏆 VICTOIRE DE ${wn.toUpperCase()} ! 🏆`,cls:"w"}];
  await updateDoc(rr(G.roomId),{phase:'combat','combat.winner':w,'combat.log':log,'combat.p1Score':s1,'combat.p2Score':s2});
}

window.go=async function(u){const r=qs.get('room');if(r){await joinRoom(r.toUpperCase());}else{await createRoom(u);}};
$('bStart').addEventListener('click',async()=>{if(G.isHost)await updateDoc(rr(G.roomId),{phase:'auction'});});
$('bCopy').addEventListener('click',()=>{navigator.clipboard.writeText($('sLink').value).catch(()=>{});toast('Lien copié !');});

// Boot
const roomUrl=qs.get('room');
if(roomUrl){(async()=>{const s=await getDoc(rr(roomUrl.toUpperCase()));if(s.exists()){G.universe=s.data().universe;await joinRoom(roomUrl.toUpperCase());}else toast('Salle introuvable !');})();}
</script>
